name: CI

# Blue Zone (public GitHub-hosted runners): lint → test → build-verify.
# Publishing is a SEPARATE workflow (publish-docker.yml) that runs only after
# this one succeeds on main — see the FaultMaven CI/CD architecture
# (faultmaven-doc-internal/architecture/cicd/pipeline.md).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      # ruff is pinned in requirements-dev.txt (single source of truth for the
      # linter version — no separate pin here); install just it, not the whole set.
      - run: pip install "$(grep -E '^ruff==' requirements-dev.txt)"
      - run: ruff check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest -q

  build:
    name: Build image (verify only)
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      # Verification build only — no push. The tested commit is published by
      # publish-docker.yml after this workflow succeeds on main.
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: faultmaven-slack-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
