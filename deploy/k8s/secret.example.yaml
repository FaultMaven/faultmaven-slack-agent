# TEMPLATE — do NOT commit real values. Create the real Secret out-of-band
# (sealed-secrets / ExternalSecrets / `kubectl create secret`), never from this
# file with secrets filled in. Keys the agent reads at startup:
apiVersion: v1
kind: Secret
metadata:
  name: faultmaven-slack-agent
  namespace: faultmaven
type: Opaque
stringData:
  # From the Slack app's Basic Information → App Credentials.
  SLACK_CLIENT_ID: "<app client id>"
  SLACK_CLIENT_SECRET: "<app client secret>"
  SLACK_SIGNING_SECRET: "<app signing secret>"
  # Dedicated Postgres DB/schema for Slack installs + OAuth state (NOT the core
  # app DB tables — same server is fine, separate database). The stores create
  # their tables on first boot.
  SLACK_DATABASE_URL: "postgresql://faultmaven_slack:<pw>@postgres:5432/faultmaven_slack"
  # FaultMaven backend identity for the beta: a single cloud service token that
  # every workspace's turns run under (per-user PKCE linking + workspace→org
  # binding are deferred — blocked on backend asks, docs/design.md §15). Leave
  # empty ONLY if api.faultmaven.ai exposes dev-login (it does not in cloud).
  FAULTMAVEN_API_TOKEN: "<cloud FM service bearer token>"
