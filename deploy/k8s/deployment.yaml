apiVersion: apps/v1
kind: Deployment
metadata:
  name: faultmaven-slack-agent
  namespace: faultmaven
  labels:
    app: faultmaven-slack-agent
spec:
  # SINGLE replica — deliberate. The multi-workspace OAuth store is Postgres
  # (shared, replica-safe), but the thread→case map (SQLite) and the in-process
  # drop-if-busy gate + event dedup are per-process. Running >1 replica would
  # split those and break one-turn-per-thread / duplicate suppression. Scaling
  # out is gated on externalizing the case store (see docs/HOSTING.md).
  replicas: 1
  strategy:
    type: Recreate # never two processes on the per-process state, even briefly
  selector:
    matchLabels:
      app: faultmaven-slack-agent
  template:
    metadata:
      labels:
        app: faultmaven-slack-agent
    spec:
      # Must exceed FAULTMAVEN_REQUEST_TIMEOUT (120s) + the shutdown drain
      # headroom (10s) so SIGTERM's in-flight-turn drain completes before
      # SIGKILL — otherwise a turn is killed mid-flight and its "Investigating…"
      # placeholder strands forever.
      terminationGracePeriodSeconds: 150
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: agent
          image: ghcr.io/faultmaven/faultmaven-slack-agent:latest # pin a tag in prod
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: faultmaven-slack-agent
            - secretRef:
                name: faultmaven-slack-agent
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # writes /app/data (unused with Postgres)
            capabilities:
              drop: ["ALL"]
